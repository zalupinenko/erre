<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FranklinEx · Рассылка</title>
  <style>
    :root{
      --bg:#0b1220; --card:#0f1a30; --border:#223255;
      --text:#e9f0ff; --muted:#a9b6d6;
      --accent:#5eead4; --ok:#34d399; --bad:#fb7185; --warn:#fbbf24;
      --btn:#2d5bff; --btn2:#1f3fb3;
      --shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 700px at 15% 0%, rgba(45,91,255,.18), transparent 60%),
        radial-gradient(900px 650px at 80% 90%, rgba(52,211,153,.12), transparent 65%),
        #071022;
      color:var(--text);
      min-height:100vh;
    }
    .wrap{ max-width:860px; margin:0 auto; padding:18px 14px 40px; }

    /* ── Top bar ── */
    .top{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
    .pageTitle{ font-weight:1000; font-size:20px; }
    .hint{ color:var(--muted); font-weight:850; font-size:12px; margin-top:3px; }
    .btnGhost{
      border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:10px 14px;
      background:rgba(255,255,255,.06); color:#fff; font-weight:1000; cursor:pointer;
      text-decoration:none; display:inline-flex; align-items:center;
    }

    /* ── Card ── */
    .card{
      background:rgba(15,26,48,.72);
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;
      padding:18px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }
    .cardTitle{ font-weight:1000; font-size:15px; margin-bottom:14px; }

    /* ── Format toolbar ── */
    .toolbar{
      display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;
    }
    .fmtBtn{
      border:1px solid rgba(255,255,255,.14); border-radius:10px;
      background:rgba(255,255,255,.06); color:var(--text);
      padding:6px 12px; font-size:13px; font-weight:900;
      cursor:pointer; user-select:none;
      transition: background .12s;
    }
    .fmtBtn:hover{ background:rgba(255,255,255,.12); }
    .fmtBtn.active{ background:rgba(45,91,255,.30); border-color:rgba(45,91,255,.55); }

    /* ── Textarea ── */
    textarea{
      width:100%; min-height:180px; resize:vertical;
      background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.12);
      border-radius:14px; padding:14px; color:var(--text);
      font-size:14px; font-family:inherit; line-height:1.55;
      outline:none; transition:border-color .15s;
    }
    textarea:focus{ border-color:rgba(45,91,255,.5); }
    .charCount{ text-align:right; font-size:11px; color:var(--muted); margin-top:4px; }

    /* ── Image drop zone ── */
    .imgZone{
      border:2px dashed rgba(255,255,255,.14); border-radius:16px;
      padding:20px; text-align:center; cursor:pointer;
      transition: border-color .15s, background .15s;
      margin-top:10px;
      position:relative;
    }
    .imgZone:hover, .imgZone.drag{ border-color:rgba(45,91,255,.55); background:rgba(45,91,255,.06); }
    .imgZone.hasFile{ border-color:rgba(52,211,153,.4); background:rgba(52,211,153,.05); }
    .imgZoneText{ font-size:13px; color:var(--muted); font-weight:900; }
    .imgZoneFile{ position:absolute; inset:0; opacity:0; cursor:pointer; }
    .imgPreviewWrap{ margin-top:12px; display:none; }
    .imgPreviewWrap.show{ display:block; }
    .imgPreview{ max-width:100%; max-height:260px; border-radius:12px; object-fit:contain; }
    .imgClear{ margin-top:8px; background:none; border:1px solid rgba(251,113,133,.4);
      color:var(--bad); border-radius:10px; padding:5px 12px; cursor:pointer; font-size:12px; font-weight:900; }

    /* ── Preview card ── */
    .previewCard{
      background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.08);
      border-radius:16px; padding:14px; margin-top:10px;
    }
    .previewLabel{ font-size:11px; color:var(--muted); font-weight:900; margin-bottom:8px; }
    .previewBody{
      font-size:14px; line-height:1.55; white-space:pre-wrap; word-break:break-word;
    }
    .previewBody b, .previewBody strong{ color:#fff; }
    .previewBody i, .previewBody em{ color:#c8d8ff; }
    .previewBody code{ background:rgba(255,255,255,.10); border-radius:5px; padding:1px 5px; font-family:monospace; font-size:13px; }
    .previewBody pre{ background:rgba(0,0,0,.30); border-radius:10px; padding:10px; overflow:auto; }
    .previewBody a{ color:var(--accent); }

    /* ── Actions ── */
    .actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; align-items:center; }
    .btnMain{
      border:0; border-radius:14px; padding:13px 24px;
      background:linear-gradient(180deg, var(--btn), var(--btn2));
      color:#fff; font-weight:1000; font-size:14px; cursor:pointer;
      box-shadow:0 8px 24px rgba(45,91,255,.35);
      transition:opacity .15s;
    }
    .btnMain:disabled{ opacity:.5; cursor:not-allowed; box-shadow:none; }
    .btnTest{
      border:1px solid rgba(52,211,153,.35); border-radius:14px; padding:12px 20px;
      background:rgba(52,211,153,.10); color:var(--ok);
      font-weight:1000; font-size:14px; cursor:pointer;
      transition:background .15s;
    }
    .btnTest:disabled{ opacity:.5; cursor:not-allowed; }
    .btnTest:not(:disabled):hover{ background:rgba(52,211,153,.18); }
    .testHint{ font-size:11px; color:var(--muted); font-weight:900; }

    /* ── Status ── */
    .statusBox{
      border-radius:14px; padding:12px 14px; font-weight:900; font-size:13px;
      border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.22);
      white-space:pre-line; display:none; margin-top:12px;
    }
    .statusBox.show{ display:block; }
    .statusBox.ok{ border-color:rgba(52,211,153,.35); background:rgba(52,211,153,.08); color:var(--ok); }
    .statusBox.bad{ border-color:rgba(251,113,133,.35); background:rgba(251,113,133,.08); color:var(--bad); }
    .statusBox.info{ border-color:rgba(251,191,36,.30); background:rgba(251,191,36,.06); color:var(--warn); }

    /* ── Progress ── */
    .progressWrap{ display:none; margin-top:12px; }
    .progressWrap.show{ display:block; }
    .progressBar{ height:6px; border-radius:3px; background:rgba(255,255,255,.08); overflow:hidden; margin-bottom:6px; }
    .progressFill{ height:100%; border-radius:3px; background:linear-gradient(90deg,var(--ok),#16a34a); transition:width .4s ease; }
    .progressText{ font-size:12px; color:var(--muted); font-weight:900; }

    /* ── Separator ── */
    .sep{ height:1px; background:rgba(255,255,255,.07); margin:16px 0; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div>
      <div class="pageTitle">📣 Рассылка</div>
      <div class="hint">Отправка сообщений всем пользователям через Telegram</div>
    </div>
    <a class="btnGhost" href="./admin.html">← Назад</a>
  </div>

  <!-- Composer -->
  <div class="card">
    <div class="cardTitle">Сообщение</div>

    <!-- Format toolbar -->
    <div class="toolbar" id="toolbar">
      <button class="fmtBtn" data-wrap="<b>" data-wrap-close="</b>" title="Жирный"><b>B</b></button>
      <button class="fmtBtn" data-wrap="<i>" data-wrap-close="</i>" title="Курсив"><i>I</i></button>
      <button class="fmtBtn" data-wrap="<u>" data-wrap-close="</u>" title="Подчёркнутый"><u>U</u></button>
      <button class="fmtBtn" data-wrap="<s>" data-wrap-close="</s>" title="Зачёркнутый"><s>S</s></button>
      <button class="fmtBtn" data-wrap="<code>" data-wrap-close="</code>" title="Моноширинный">⌨ code</button>
      <button class="fmtBtn" data-wrap="<pre>" data-wrap-close="</pre>" title="Блок кода">⬛ pre</button>
      <button class="fmtBtn" data-link title="Ссылка">🔗 ссылка</button>
      <button class="fmtBtn" id="insertEmoji" title="Эмодзи">😊</button>
    </div>

    <textarea id="msgText" placeholder="Введите текст рассылки...&#10;&#10;Поддерживается HTML-форматирование Telegram:&#10;&lt;b&gt;жирный&lt;/b&gt;, &lt;i&gt;курсив&lt;/i&gt;, &lt;code&gt;код&lt;/code&gt;, &lt;a href=&quot;url&quot;&gt;ссылка&lt;/a&gt;"></textarea>
    <div class="charCount"><span id="charCount">0</span> / 4096</div>

    <div class="sep"></div>

    <!-- Image -->
    <div style="font-weight:900; font-size:13px; margin-bottom:8px; color:var(--muted);">📷 Изображение (необязательно)</div>
    <div class="imgZone" id="imgZone">
      <input type="file" accept="image/*" class="imgZoneFile" id="imgInput" />
      <div class="imgZoneText" id="imgZoneText">Нажмите или перетащите изображение сюда</div>
    </div>
    <div class="imgPreviewWrap" id="imgPreviewWrap">
      <img class="imgPreview" id="imgPreview" src="" alt="preview" />
      <button class="imgClear" id="imgClear">✕ Убрать изображение</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="card">
    <div class="cardTitle">Превью</div>
    <div class="previewCard">
      <div class="previewLabel">Так увидит пользователь в Telegram:</div>
      <div class="previewBody" id="previewBody"><span style="color:var(--muted); font-style:italic;">Начните вводить текст...</span></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="card">
    <div class="cardTitle">Отправка</div>
    <div class="actions">
      <button class="btnTest" id="testBtn">🧪 Тест (@xasxca96)</button>
      <button class="btnMain" id="sendBtn">📣 Отправить всем</button>
      <div class="testHint">Тест отправит только вам</div>
    </div>

    <div class="statusBox" id="statusBox"></div>

    <div class="progressWrap" id="progressWrap">
      <div class="progressBar"><div class="progressFill" id="progressFill" style="width:0%"></div></div>
      <div class="progressText" id="progressText">Отправка...</div>
    </div>
  </div>

</div>

<script>
const WORKER_BASE = (localStorage.getItem("worker_base") || "https://api.franklinex.org").replace(/\/+$/, "");
function getToken(){ return localStorage.getItem("admin_token") || ""; }

// ── State ──
let _imgFile = null;

// ── Elements ──
const msgText     = document.getElementById("msgText");
const charCount   = document.getElementById("charCount");
const imgZone     = document.getElementById("imgZone");
const imgInput    = document.getElementById("imgInput");
const imgZoneText = document.getElementById("imgZoneText");
const imgPreviewWrap = document.getElementById("imgPreviewWrap");
const imgPreview  = document.getElementById("imgPreview");
const imgClear    = document.getElementById("imgClear");
const previewBody = document.getElementById("previewBody");
const testBtn     = document.getElementById("testBtn");
const sendBtn     = document.getElementById("sendBtn");
const statusBox   = document.getElementById("statusBox");
const progressWrap= document.getElementById("progressWrap");
const progressFill= document.getElementById("progressFill");
const progressText= document.getElementById("progressText");

// ── Preview / char count ──
msgText.addEventListener("input", updatePreview);
function updatePreview(){
  const txt = msgText.value;
  charCount.textContent = txt.length;
  charCount.style.color = txt.length > 4000 ? "var(--bad)" : "var(--muted)";
  if (!txt.trim()){
    previewBody.innerHTML = '<span style="color:var(--muted); font-style:italic;">Начните вводить текст...</span>';
    return;
  }
  // Render HTML preview (Telegram HTML subset)
  previewBody.innerHTML = txt
    .replace(/&(?!amp;|lt;|gt;|quot;|#)/g, "&amp;")
    .replace(/</g, "LTPLACEHOLDER")
    .replace(/>/g, "GTPLACEHOLDER")
    .replace(/LTPLACEHOLDER\/?(b|i|u|s|code|pre)GTPLACEHOLDER/g, "<$1>")
    .replace(/LTPLACEHOLDER(b|i|u|s|code|pre)GTPLACEHOLDER/g, "<$1>")
    .replace(/LTPLACEHOLDER\/?(b|i|u|s|code|pre)\s*GTPLACEHOLDER/g, "<$1>")
    .replace(/LTPLACEHOLDERa href=GTPLACEHOLDER/g, "")
    .replace(/LTPLACEHOLDER/g, "&lt;")
    .replace(/GTPLACEHOLDER/g, "&gt;")
    // re-allow safe tags
    .replace(/&lt;(\/?(b|i|u|s|code|pre))&gt;/g, "<$1>")
    .replace(/&lt;a href="([^"]*)"&gt;(.*?)&lt;\/a&gt;/g, '<a href="$1" target="_blank">$2</a>');
}

// ── Image handling ──
imgInput.addEventListener("change", () => handleImgFile(imgInput.files[0]));
imgZone.addEventListener("dragover", e => { e.preventDefault(); imgZone.classList.add("drag"); });
imgZone.addEventListener("dragleave", () => imgZone.classList.remove("drag"));
imgZone.addEventListener("drop", e => {
  e.preventDefault(); imgZone.classList.remove("drag");
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith("image/")) handleImgFile(f);
});

function handleImgFile(f){
  if (!f || !f.type.startsWith("image/")) return;
  _imgFile = f;
  const url = URL.createObjectURL(f);
  imgPreview.src = url;
  imgPreviewWrap.classList.add("show");
  imgZone.classList.add("hasFile");
  imgZoneText.textContent = f.name + " (" + (f.size / 1024).toFixed(0) + " KB)";
}

imgClear.onclick = () => {
  _imgFile = null;
  imgPreview.src = "";
  imgPreviewWrap.classList.remove("show");
  imgZone.classList.remove("hasFile");
  imgZoneText.textContent = "Нажмите или перетащите изображение сюда";
  imgInput.value = "";
};

// ── Format toolbar ──
document.getElementById("toolbar").addEventListener("click", e => {
  const btn = e.target.closest("[data-wrap]");
  if (!btn) return;
  const open  = btn.dataset.wrap;
  const close = btn.dataset.wrapClose || "";
  const start = msgText.selectionStart;
  const end   = msgText.selectionEnd;
  const sel   = msgText.value.slice(start, end);
  const replacement = open + sel + close;
  msgText.setRangeText(replacement, start, end, "end");
  msgText.focus();
  updatePreview();
});

// Link button
document.querySelector("[data-link]").onclick = () => {
  const url = prompt("URL ссылки:", "https://");
  if (!url) return;
  const start = msgText.selectionStart;
  const end   = msgText.selectionEnd;
  const sel   = msgText.value.slice(start, end) || "текст ссылки";
  const replacement = `<a href="${url}">${sel}</a>`;
  msgText.setRangeText(replacement, start, end, "end");
  msgText.focus();
  updatePreview();
};

// Emoji picker (simple inline)
document.getElementById("insertEmoji").onclick = () => {
  const emojis = ["🎉","🔥","💎","✅","❌","⚡","🚀","📣","💰","🎁","🔔","⭐","💬","📱","🌟","👋","💯","🛡","🤝","📊"];
  const existing = document.getElementById("emojiPicker");
  if (existing){ existing.remove(); return; }
  const picker = document.createElement("div");
  picker.id = "emojiPicker";
  picker.style.cssText = "display:flex;flex-wrap:wrap;gap:4px;padding:10px;background:#0f1a30;border:1px solid rgba(255,255,255,.12);border-radius:14px;margin-top:8px;max-width:320px;";
  emojis.forEach(em => {
    const b = document.createElement("button");
    b.textContent = em;
    b.style.cssText = "background:none;border:none;font-size:22px;cursor:pointer;padding:4px;border-radius:8px;";
    b.onclick = () => {
      const s = msgText.selectionStart;
      msgText.setRangeText(em, s, s, "end");
      msgText.focus();
      updatePreview();
      picker.remove();
    };
    picker.appendChild(b);
  });
  document.getElementById("insertEmoji").after(picker);
};

// ── Status helpers ──
function showStatus(text, kind){
  statusBox.textContent = text;
  statusBox.className = "statusBox show " + (kind || "");
}
function hideStatus(){ statusBox.className = "statusBox"; }
function setProgress(pct, text){
  progressWrap.classList.add("show");
  progressFill.style.width = pct + "%";
  progressText.textContent = text;
}
function hideProgress(){ progressWrap.classList.remove("show"); }

// ── API call ──
async function doBroadcast(testOnly){
  const text = msgText.value.trim();
  if (!text){ showStatus("Введите текст сообщения", "bad"); return; }
  const tok = getToken();
  if (!tok){ showStatus("Нет admin_token в localStorage", "bad"); return; }

  testBtn.disabled = true;
  sendBtn.disabled = true;
  hideStatus();
  setProgress(0, testOnly ? "Отправка тест-сообщения..." : "Подготовка рассылки...");

  try {
    const fd = new FormData();
    fd.append("text", text);
    fd.append("parseMode", "HTML");
    fd.append("testOnly", testOnly ? "true" : "false");
    if (_imgFile) fd.append("image", _imgFile, _imgFile.name);

    setProgress(testOnly ? 50 : 10, testOnly ? "Отправка..." : "Рассылка запущена (это займёт время)...");

    const res = await fetch(WORKER_BASE + "/api/admin/broadcast", {
      method: "POST",
      headers: { "X-Admin-Token": tok },
      body: fd
    });

    setProgress(90, "Получение ответа...");

    let j = {};
    try { j = await res.json(); } catch {}

    setProgress(100, "Готово");
    setTimeout(hideProgress, 1500);

    if (res.ok && j.ok){
      if (testOnly){
        showStatus("✅ Тест отправлен → @xasxca96", "ok");
      } else {
        showStatus(
          `✅ Рассылка завершена!\nОтправлено: ${j.sent ?? "—"}\nОшибок: ${j.failed ?? 0}\nПропущено (бан/нет chatId): ${j.skipped ?? 0}`,
          "ok"
        );
      }
    } else {
      showStatus("❌ Ошибка: " + (j.error || ("HTTP " + res.status)), "bad");
    }
  } catch(e){
    hideProgress();
    showStatus("❌ " + (e.message || String(e)), "bad");
  } finally {
    testBtn.disabled = false;
    sendBtn.disabled = false;
  }
}

testBtn.onclick = () => doBroadcast(true);
sendBtn.onclick = () => {
  const text = msgText.value.trim();
  if (!text){ showStatus("Введите текст", "bad"); return; }
  if (!confirm("Отправить рассылку всем пользователям?\n\nТекст:\n" + text.slice(0, 200) + (text.length > 200 ? "…" : ""))){
    return;
  }
  doBroadcast(false);
};
</script>
</body>
</html>
