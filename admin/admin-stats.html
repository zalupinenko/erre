<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Админка · Статистика</title>
  <style>
    :root{
      --bg:#0b1220; --card:#0f1a30; --border:#223255;
      --text:#e9f0ff; --muted:#9fb0d4;
      --btn:#2563eb; --warn:#f59e0b; --danger:#ef4444; --ok:#22c55e;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    body{ margin:0; background:var(--bg); color:var(--text); }
    .wrap{ max-width:1100px; margin:0 auto; padding:18px; }

    .top{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .title{ font-weight:1000; font-size:18px; }
    .backBtn{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:#fff; font-weight:950; padding:8px 14px;
      border-radius:12px; cursor:pointer; text-decoration:none; font-size:13px;
    }

    .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:16px; }
    .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
    @media(max-width:900px){ .grid3{ grid-template-columns:1fr; } .grid2{ grid-template-columns:1fr; } }

    .card{
      background:var(--card); border:1px solid var(--border);
      border-radius:18px; padding:18px;
      box-shadow:0 18px 50px rgba(0,0,0,.35);
    }
    .cardTitle{ font-weight:1000; font-size:13px; color:var(--muted); margin-bottom:14px; text-transform:uppercase; letter-spacing:.5px; }

    .bigNum{ font-weight:1000; font-size:32px; line-height:1.1; }
    .bigLabel{ font-size:12px; color:var(--muted); font-weight:800; margin-top:4px; }

    .statRow{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.06); }
    .statRow:last-child{ border-bottom:none; }
    .statKey{ font-weight:900; font-size:13px; color:var(--muted); }
    .statVal{ font-weight:1000; font-size:14px; }

    .tag{
      display:inline-block; padding:3px 8px; border-radius:999px; font-weight:900; font-size:11px;
      border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); margin:2px 3px 2px 0;
    }
    .tag.ok{ background:rgba(34,197,94,.12); border-color:rgba(34,197,94,.25); color:#4ade80; }
    .tag.warn{ background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.25); color:#fbbf24; }
    .tag.bad{ background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.25); color:#f87171; }
    .tag.blue{ background:rgba(37,99,235,.12); border-color:rgba(37,99,235,.25); color:#60a5fa; }

    .accent-ok{ color:var(--ok); }
    .accent-warn{ color:var(--warn); }
    .accent-blue{ color:#60a5fa; }
    .accent-bad{ color:var(--danger); }

    .refreshInfo{ font-size:11px; color:var(--muted); font-weight:800; margin-top:8px; }

    .loading{ text-align:center; padding:40px; font-weight:900; color:var(--muted); }
    .error{ text-align:center; padding:20px; font-weight:900; color:#f87171; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">Статистика обменника</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="refreshInfo" id="refreshInfo"></span>
        <a class="backBtn" href="./admin.html">← Назад</a>
      </div>
    </div>

    <div id="content">
      <div class="loading" id="loader">Загрузка статистики…</div>
    </div>
  </div>

<script>
  const WORKER_BASE = "https://api.franklinex.org";

  function getToken(){ return localStorage.getItem("admin_token") || ""; }
  function getInitData(){
    try{
      const tg = window.Telegram && window.Telegram.WebApp;
      return (tg && typeof tg.initData === "string") ? tg.initData : "";
    }catch{ return ""; }
  }

  async function api(path){
    const headers = {};
    const initData = getInitData();
    if (initData) headers["X-Tg-Init-Data"] = initData;
    const t = getToken();
    if (t) headers["X-Admin-Token"] = t;
    const res = await fetch(WORKER_BASE + path, { headers, cache:"no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  function fmtRub(n){
    if (!Number.isFinite(n)) return "0 ₽";
    return Math.round(n).toLocaleString("ru-RU") + " ₽";
  }
  function fmtNum(n){
    if (!Number.isFinite(n)) return "0";
    return n.toLocaleString("ru-RU");
  }

  function statusTags(byStatus){
    const order = ["NEW","ON_PAY","PAID","ON_CHECK","SUCCESS","DONE","COMPLETED","FAILED","CANCELED","CANCELLED","ERROR"];
    const classes = { SUCCESS:"ok", DONE:"ok", COMPLETED:"ok", BYBIT_DONE:"ok", NEW:"blue", ON_PAY:"warn", PAID:"warn", ON_CHECK:"warn", WAIT_CRYPTO:"warn", CRYPTO_RECEIVED:"warn", FAILED:"bad", CANCELED:"bad", CANCELLED:"bad", ERROR:"bad", CRYPTO_NOT_RECEIVED:"bad" };
    const keys = Object.keys(byStatus || {}).sort((a,b) => {
      const ia = order.indexOf(a), ib = order.indexOf(b);
      return (ia===-1?99:ia) - (ib===-1?99:ib);
    });
    return keys.map(k => `<span class="tag ${classes[k]||""}">${k}: ${byStatus[k]}</span>`).join("");
  }

  async function load(){
    const content = document.getElementById("content");
    try {
      const j = await api("/api/admin/stats");
      if (!j || !j.ok || !j.stats) throw new Error("Bad response");
      const s = j.stats;

      content.innerHTML = `
        <!-- Overview row -->
        <div class="grid3">
          <div class="card">
            <div class="cardTitle">Пользователи</div>
            <div class="bigNum accent-blue">${fmtNum(s.totalUsers)}</div>
            <div class="bigLabel">Всего зарегистрировано</div>
          </div>
          <div class="card">
            <div class="cardTitle">Активные сделки</div>
            <div class="bigNum accent-warn">${fmtNum(s.activeDeals)}</div>
            <div class="bigLabel">Сейчас в работе</div>
          </div>
          <div class="card">
            <div class="cardTitle">Завершено сегодня</div>
            <div class="bigNum accent-ok">${fmtNum((s.buy?.completedToday||0) + (s.sell?.completedToday||0))}</div>
            <div class="bigLabel">BUY: ${s.buy?.completedToday||0} · SELL: ${s.sell?.completedToday||0}</div>
          </div>
        </div>

        <!-- Daily turnover -->
        <div class="grid3">
          <div class="card">
            <div class="cardTitle">Оборот BUY (сегодня)</div>
            <div class="bigNum accent-ok">${fmtRub(s.buy?.todayRub)}</div>
            <div class="bigLabel">Всего: ${fmtRub(s.buy?.totalRub)}</div>
            <div style="margin-top:10px">
              <div class="statRow">
                <span class="statKey">Завершённых всего</span>
                <span class="statVal">${fmtNum(s.buy?.completedAll)}</span>
              </div>
              <div class="statRow">
                <span class="statKey">Всего заявок</span>
                <span class="statVal">${fmtNum(s.buy?.total)}</span>
              </div>
              <div class="statRow">
                <span class="statKey">Активных</span>
                <span class="statVal accent-warn">${fmtNum(s.buy?.activeNow)}</span>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="cardTitle">Оборот SELL (сегодня)</div>
            <div class="bigNum accent-ok">${fmtRub(s.sell?.todayRub)}</div>
            <div class="bigLabel">Всего: ${fmtRub(s.sell?.totalRub)}</div>
            <div style="margin-top:10px">
              <div class="statRow">
                <span class="statKey">Завершённых всего</span>
                <span class="statVal">${fmtNum(s.sell?.completedAll)}</span>
              </div>
              <div class="statRow">
                <span class="statKey">Всего сделок</span>
                <span class="statVal">${fmtNum(s.sell?.total)}</span>
              </div>
              <div class="statRow">
                <span class="statKey">Активных</span>
                <span class="statVal accent-warn">${fmtNum(s.sell?.activeNow)}</span>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="cardTitle">Оборот QR (сегодня)</div>
            <div class="bigNum accent-ok">${fmtRub(s.qr?.todayRub)}</div>
            <div class="bigLabel">Всего: ${fmtRub(s.qr?.totalRub)}</div>
            <div style="margin-top:10px">
              <div class="statRow">
                <span class="statKey">Завершённых всего</span>
                <span class="statVal">${fmtNum(s.qr?.completedAll)}</span>
              </div>
              <div class="statRow">
                <span class="statKey">Завершено сегодня</span>
                <span class="statVal">${fmtNum(s.qr?.completedToday)}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Общий оборот + детали -->
        <div class="grid2">
          <div class="card">
            <div class="cardTitle">Общий оборот (сегодня)</div>
            <div class="bigNum" style="color:#a78bfa;">${fmtRub((s.buy?.todayRub||0) + (s.sell?.todayRub||0))}</div>
            <div class="bigLabel">BUY + SELL за сегодня</div>
            <div style="margin-top:12px">
              <div class="statRow">
                <span class="statKey">Общий оборот (всё время)</span>
                <span class="statVal">${fmtRub((s.buy?.totalRub||0) + (s.sell?.totalRub||0))}</span>
              </div>
              <div class="statRow">
                <span class="statKey">Стакан SELL (активных)</span>
                <span class="statVal">${fmtNum(s.sellOffers?.active)} / ${fmtNum(s.sellOffers?.total)}</span>
              </div>
              <div class="statRow">
                <span class="statKey">Настройки: Buy %</span>
                <span class="statVal">${s.config?.buyPercent ?? "—"}</span>
              </div>
              <div class="statRow">
                <span class="statKey">Настройки: Sell %</span>
                <span class="statVal">${s.config?.sellPercent ?? "—"}</span>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="cardTitle">Лог сделок</div>
            <div class="bigNum accent-blue">${fmtNum(s.dealLog?.total)}</div>
            <div class="bigLabel">Всего записей в логе</div>
            <div style="margin-top:12px">
              <div class="statRow">
                <span class="statKey">Записей сегодня</span>
                <span class="statVal accent-warn">${fmtNum(s.dealLog?.today)}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Status breakdowns -->
        <div class="grid2">
          <div class="card">
            <div class="cardTitle">BUY — статусы</div>
            <div style="line-height:1.8;">${statusTags(s.buy?.byStatus)}</div>
          </div>
          <div class="card">
            <div class="cardTitle">SELL — статусы</div>
            <div style="line-height:1.8;">${statusTags(s.sell?.byStatus)}</div>
          </div>
        </div>
      `;

      document.getElementById("refreshInfo").textContent = "Обновлено: " + new Date().toLocaleTimeString("ru-RU");

    } catch(e) {
      content.innerHTML = `<div class="error">Ошибка загрузки: ${e.message}<br><br><button onclick="load()" style="border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;font-weight:950;padding:10px 18px;border-radius:12px;cursor:pointer;">Повторить</button></div>`;
    }
  }

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
