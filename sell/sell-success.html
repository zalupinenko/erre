<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FranklinEx · Успешно</title>
  <style>
    :root{
      --text:#e9f0ff;
      --muted:#9fb0d4;
      --card: rgba(15, 26, 48, 0.52);
      --border: rgba(255,255,255,.12);
      --ok:#22c55e;
      --btn:#2d5bff;
      --btn2:#1f3fb3;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    *,*::before,*::after{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0; color:var(--text); background:#071022;
      overflow:hidden;
    }
    .overlay{
      position:fixed; inset:0; z-index:-2;
      background:
        radial-gradient(1100px 700px at 50% -220px, rgba(45,91,255,.22), rgba(0,0,0,0) 65%),
        radial-gradient(900px 600px at 85% 85%, rgba(34,197,94,.14), rgba(0,0,0,0) 60%),
        linear-gradient(180deg, rgba(7,16,34,.84), rgba(7,16,34,.94));
      pointer-events:none;
    }
    .page{
      height:100svh;
      display:flex; justify-content:center; align-items:center;
      padding: 16px;
    }
    .card{
      width:100%; max-width:720px;
      position:relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow:hidden;
      text-align:center;
    }
    .card::before{
      content:"";
      position:absolute; inset:-70px; z-index:0;
      background:
        radial-gradient(520px 180px at 35% 20%, rgba(45,91,255,.18), rgba(0,0,0,0) 60%),
        radial-gradient(520px 180px at 75% 90%, rgba(34,197,94,.16), rgba(0,0,0,0) 60%);
      filter: blur(18px);
      pointer-events:none;
    }
    .card > *{ position:relative; z-index:1; }

    .check{
      width:86px; height:86px; margin: 0 auto 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(34,197,94,.12);
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      display:flex; align-items:center; justify-content:center;
      animation: pop .55s ease both;
    }
    @keyframes pop{
      0%{ transform: scale(.85); opacity: 0; }
      100%{ transform: scale(1); opacity: 1; }
    }
    .check svg{ width:46px; height:46px; }
    .h1{ font-weight:1000; font-size:18px; margin:0 0 6px; }
    .p{ color:rgba(233,240,255,.78); font-weight:900; font-size:12px; margin:0; line-height:1.5; }
    .btn{
      margin-top:14px;
      border:0;
      border-radius:14px;
      padding:12px 18px;
      background: linear-gradient(180deg, var(--btn), var(--btn2));
      color:#fff;
      font-weight:1000;
      cursor:pointer;
      box-shadow: 0 10px 26px rgba(0,0,0,.30);
      min-width: 190px;
    }
    .mini{ margin-top:10px; color:var(--muted); font-weight:900; font-size:12px; }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="page">
    <div class="card">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M20 6L9 17l-5-5" stroke="rgba(233,240,255,.95)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="h1">Успешно ✅</div>
      <div class="p">Сделка отмечена как завершённая. Спасибо!</div>
      <button class="btn" onclick="location.href='./index.html'">На главную</button>
      <div class="mini" id="dealIdV"></div>
    </div>
  </div>

<script>
  const dealId = new URL(location.href).searchParams.get("dealId") || "";
  document.getElementById("dealIdV").textContent = dealId ? ("ID сделки: " + dealId) : "";
</script>
<script src="../assets/js/resume-helper.js"></script>
<script>(function(){
  if (window.CrossflagResume && dealId) window.CrossflagResume.removeSell(dealId);
})();</script>
</body>
</html>
