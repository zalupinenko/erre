<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FranklinEx · QR</title>
  <style>
    :root{
      --bg:#071022;
      --text:#e9f0ff;
      --muted:#9fb0d4;
      --card: rgba(15, 26, 48, 0.55);
      --border: rgba(255,255,255,.12);
      --blue:#2d5bff;
      --blue2:#1f46db;
      --shadow: 0 14px 50px rgba(0,0,0,.55);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(900px 500px at 60% -10%, rgba(45,91,255,.22), transparent 60%), var(--bg);
      color: var(--text);
      min-height:100vh;
      padding: 18px 14px;
    }
    .wrap{
      max-width: 720px;
      margin: 0 auto;
    }
    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
      backdrop-filter: blur(10px);
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 12px;
    }
    .title{
      font-weight: 1000;
      font-size: 18px;
      letter-spacing:.2px;
    }
    .btnGhost{
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: 900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      word-break: break-word;
      color: rgba(233,240,255,.92);
      font-size: 12.5px;
      line-height: 1.35;
      margin-top: 8px;
      padding: 10px 12px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
    }
    .hint{ color: var(--muted); margin-top: 6px; line-height:1.35; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px; }
    .btnPrimary{
      border:none;
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue2) 100%);
      color:#fff;
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: 1000;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="title">QR-код распознан</div>
        <a class="btnGhost" href="./qr.html">← На главную</a>
      </div>

      <div class="hint">
        Мы получили данные из QR-кода. Ниже показано содержимое. Если это ссылка — можно открыть её.
      </div>

      <div class="mono" id="payloadBox">—</div>

      <div class="row">
        <a class="btnPrimary" id="openLink" href="#" target="_blank" style="display:none;">Открыть ссылку</a>
        <a class="btnGhost" id="copyBtn" href="javascript:void(0)">Скопировать</a>
      </div>
    </div>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const payload = qs.get("payload") || "";
    const box = document.getElementById("payloadBox");
    const openLink = document.getElementById("openLink");
    const copyBtn = document.getElementById("copyBtn");

    function isLikelyUrl(s){
      try{
        const u = new URL(s);
        return u && (u.protocol === "http:" || u.protocol === "https:");
      }catch(_){}
      return false;
    }

    box.textContent = payload ? payload : "—";

    if (payload && isLikelyUrl(payload)){
      openLink.href = payload;
      openLink.style.display = "";
    }

    copyBtn.onclick = async () => {
      try{
        await navigator.clipboard.writeText(payload || "");
        copyBtn.textContent = "Скопировано ✅";
        setTimeout(()=> copyBtn.textContent = "Скопировать", 1200);
      }catch(e){
        alert("Не получилось скопировать.");
      }
    };
  </script>
</body>
</html>
