g:14px 16px;background:linear-gradient(180deg,var(--btn),var(--btn2));color:var(--text);font-weight:1000;font-size:16px;cursor:pointer;box-shadow:0 14px 32px rgba(0,0,0,.30);margin-top:14px}.note{margin-top:12px;text-align:center;font-size:12px;font-weight:850;color:rgba(233,240,255,.55)}</style></head><body><div class="overlay"></div><div class="wrap"><div class="card"><div class="icon">🕓</div><div class="title">Оплата принята</div><div class="sub">Спасибо. Если всё в порядке, вознаграждение в USDT будет начислено на ваш кошелёк в течение <b>6 часов</b>.</div><div class="meta"><div class="line"><div class="lk">Статус</div><div class="lv">Ожидается начисление</div></div><div class="line"><div class="lk">Действие</div><div class="lv">Проверьте уведомления позже</div></div></div><button class="btn" id="homeBtn" type="button">В главное меню</button><div class="note">Начисление происходит после подтверждения сделки.</div></div></div><script>document.getElementById('homeBtn').onclick=()=>location.href='./index.html';</script></body></html>
